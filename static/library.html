<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频库 - 视频流媒体服务器</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="/" class="header-home" title="首页">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </a>
            <h1>视频库</h1>
        </div>
        <div class="header-right">
            <div id="status"></div>
            <button id="settings-btn" onclick="toggleSettings()" title="设置">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- 设置面板 -->
    <div id="settings-overlay" class="hidden" onclick="toggleSettings()"></div>
    <div id="settings-panel" class="hidden">
        <div class="settings-header">
            <h2>设置</h2>
            <button class="close-btn" onclick="toggleSettings()">&times;</button>
        </div>
        <div class="settings-body">
            <div class="form-group">
                <label for="input-video-dir">视频目录</label>
                <input type="text" id="input-video-dir" placeholder="/path/to/videos">
                <span class="hint">视频文件所在的本地路径</span>
            </div>
            <div class="form-group">
                <label for="input-cache-dir">缓存目录</label>
                <input type="text" id="input-cache-dir" placeholder="/path/to/cache">
                <span class="hint">转码后 HLS 分片的存储路径</span>
            </div>
            <div class="form-group">
                <label for="input-max-cache">最大缓存大小 (GB)</label>
                <input type="number" id="input-max-cache" min="1" max="500" value="50">
                <span class="hint">超出后自动清理最旧的缓存</span>
            </div>
            <button id="save-btn" class="primary-btn" onclick="saveSettings()">保存</button>
            <div id="settings-msg" class="hidden"></div>
        </div>
    </div>

    <main>
        <!-- 排序和分页控件 -->
        <div class="toolbar" id="toolbar">
            <div class="toolbar-left">
                <div class="sort-group">
                    <label>排序:</label>
                    <select id="sort-select" onchange="changeSort(this.value)">
                        <option value="name-asc">名称 A-Z</option>
                        <option value="name-desc">名称 Z-A</option>
                        <option value="time-desc" selected>最新优先</option>
                        <option value="time-asc">最早优先</option>
                        <option value="size-desc">最大优先</option>
                        <option value="size-asc">最小优先</option>
                    </select>
                </div>
                <button id="cache-init-btn" class="cache-btn" onclick="startBatchCache()">一键缓存全部</button>
                <button id="cache-stop-btn" class="cache-btn cache-btn-stop hidden" onclick="stopBatchCache()">停止缓存</button>
                <div class="sort-group">
                    <label>每页:</label>
                    <select id="perpage-select" onchange="changePerPage(this.value)">
                        <option value="12" selected>12</option>
                        <option value="24">24</option>
                        <option value="36">36</option>
                        <option value="48">48</option>
                        <option value="60">60</option>
                        <option value="72">72</option>
                        <option value="84">84</option>
                    </select>
                </div>
            </div>
            <div class="page-info" id="page-info"></div>
        </div>

        <!-- 批量缓存进度 -->
        <div id="batch-progress" class="batch-progress hidden">
            <div class="batch-info">
                <span id="batch-status"></span>
                <span id="batch-current"></span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <!-- 磁盘空间提示 -->
        <div id="disk-warning" class="disk-warning hidden"></div>

        <!-- 视频库 -->
        <section id="library" class="active">
            <div id="video-grid"></div>
            <div id="loading">加载中...</div>
        </section>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>

        <!-- 播放器 -->
        <section id="player-section" class="hidden">
            <button id="back-btn" onclick="goBack()">&#8592; 返回</button>
            <div class="player-wrapper">
                <video id="video-player" controls></video>
            </div>
            <div id="video-info"></div>
            <div id="quality-selector">
                <label>画质:</label>
                <select id="quality-select" onchange="switchQuality(this.value)">
                </select>
            </div>
        </section>
    </main>

    <!-- 缓存决策弹窗 -->
    <div id="cache-modal-overlay" class="modal-overlay hidden" onclick="closeCacheModal()"></div>
    <div id="cache-modal" class="modal hidden">
        <div class="modal-header">
            <h3>缓存不足</h3>
            <button class="close-btn" onclick="closeCacheModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p id="cache-modal-msg"></p>
            <div class="modal-actions">
                <button class="primary-btn" onclick="expandCacheAndPlay()">更改最大缓存大小</button>
                <button class="secondary-btn" onclick="evictAndPlay()">覆盖最早缓存并播放</button>
            </div>
            <div id="cache-modal-expand" class="hidden">
                <div class="form-group">
                    <label>新的最大缓存大小 (GB)</label>
                    <input type="number" id="new-max-cache" min="1" max="500">
                    <span id="cache-modal-hint" class="hint"></span>
                </div>
                <div class="modal-actions">
                    <button class="primary-btn" onclick="confirmExpandAndPlay()">确认并播放</button>
                    <button class="secondary-btn" onclick="closeCacheModal()">取消</button>
                </div>
            </div>
            <div id="cache-modal-msg2" class="hidden"></div>
        </div>
    </div>

    <script src="/static/library.js"></script>
</body>
</html>
